name: e2e

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '13 0 * * *'  # Runs every day at 00:13 UTC

jobs:
  simple-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Generate UUID
        id: uuid
        run: echo "value=$(uuidgen)" >> "$GITHUB_OUTPUT"
      - name: Publish Module
        uses: ./  # Use the action defined in this repository
        with:
          unmold-api-token: ${{ secrets.UNMOLD_API_TOKEN }}
          name: 'sample-module-${{ steps.uuid.outputs.value }}'
          system: 'aws'
          version: '1.0.0'
          module-path: './test/fixture-module'

  overwrite-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Generate UUID
        id: uuid
        run: echo "value=$(uuidgen)" >> "$GITHUB_OUTPUT"
      - name: Publish Module (Initial)
        uses: ./  # Use the action defined in this repository
        with:
          unmold-api-token: ${{ secrets.UNMOLD_API_TOKEN }}
          name: 'overwrite-test-module-${{ steps.uuid.outputs.value }}'
          system: 'aws'
          version: '1.0.0'
          module-path: './test/fixture-module'
      - name: Publish Module (Overwrite)
        uses: ./  # Use the action defined in this repository
        with:
          unmold-api-token: ${{ secrets.UNMOLD_API_TOKEN }}
          name: 'overwrite-test-module-${{ steps.uuid.outputs.value }}'
          system: 'aws'
          version: '1.0.0'
          module-path: './test/fixture-module'
          overwrite: true